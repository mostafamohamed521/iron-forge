{% extends 'base.html' %}
{% block title %}Check Your Email — IronForge{% endblock %}

{% block content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding: calc(var(--nav-h) + 40px) 24px 80px;">
  <div style="width:100%; max-width:440px; text-align:center;">
    <div class="card">
      <div class="card-body" style="padding:48px 36px;">
        <div style="width:72px;height:72px;border-radius:50%;background:rgba(34,197,94,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
          <i class="bi bi-envelope-check-fill" style="font-size:2rem; color:var(--success);"></i>
        </div>
        <h3 style="color:var(--text); margin-bottom:12px;">Check Your Email</h3>
        <p style="margin-bottom:28px;">
          We've sent password reset instructions to your email. Check your inbox (and spam folder).
        </p>
        <a href="{% url 'account_login' %}" class="btn btn-primary btn-full">
          <i class="bi bi-box-arrow-in-right"></i> Back to Sign In
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
