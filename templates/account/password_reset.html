{% extends 'base.html' %}
{% load allauth i18n %}

{% block title %}Reset Password — IronForge{% endblock %}

{% block content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding: calc(var(--nav-h) + 40px) 24px 80px;">
  <div style="width:100%; max-width:440px;">

    <div style="text-align:center; margin-bottom:40px;">
      <a href="/" class="nav-logo" style="font-size:2.2rem; display:inline-block; margin-bottom:16px;">IRON<span>FORGE</span></a>
      <h2 style="font-size:1.8rem; margin-bottom:8px;">Reset Password</h2>
      <p style="font-size:.95rem;">Enter your email and we'll send you a reset link.</p>
    </div>

    <div class="card">
      <div class="card-body" style="padding:36px;">
        <form method="post">
          {% csrf_token %}
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control"
              placeholder="you@example.com" autofocus required />
          </div>
          <button type="submit" class="btn btn-primary btn-full">
            <i class="bi bi-envelope"></i> Send Reset Link
          </button>
        </form>
        <div style="text-align:center; margin-top:20px;">
          <a href="{% url 'account_login' %}" style="font-size:.9rem; color:var(--text-dim);">
            <i class="bi bi-arrow-left"></i> Back to Sign In
          </a>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}
